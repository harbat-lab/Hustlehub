<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HustleHub KE - Kazi za Everykind</title>
  <meta name="theme-color" content="#1EBE5B">
  <link rel="manifest" href="data:application/manifest+json,{"name":"HustleHub KE","short_name":"HustleHub","start_url":".","display":"standalone","background_color":"#0D1B2A","theme_color":"#1EBE5B","icons":[{"src":"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%231EBE5B'/><text x='50' y='65' font-size='60' text-anchor='middle' fill='white'>H</text></svg>","sizes":"192x192","type":"image/svg+xml"}]}">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <div class="container">
      <div class="nav-inner">
        <div class="logo" onclick="showPage('home')">Hustle<span>Hub</span> KE</div>
        <div class="desktop-only">
          <button class="btn btn-outline" onclick="showPage('jobs')">Kazi</button>
          <button class="btn" onclick="showPage('post')">Weka Kazi</button>
        </div>
      </div>
    </div>
  </nav>

  <div id="app" class="container"></div>

  <div class="bottom-nav">
    <div class="bottom-nav-item active" onclick="showPage('home')">
      <div>🏠</div><div>Home</div>
    </div>
    <div class="bottom-nav-item" onclick="showPage('jobs')">
      <div>💼</div><div>Kazi</div>
    </div>
    <div class="bottom-nav-item" onclick="showPage('post')">
      <div>➕</div><div>Weka</div>
    </div>
    <div class="bottom-nav-item" onclick="showPage('profile')">
      <div>👤</div><div>Profile</div>
    </div>
  </div>

  <!-- M-Pesa STK Modal -->
  <div id="stkModal" class="modal">
    <div class="modal-content">
      <h3>Lipa na M-Pesa</h3>
      <p id="stkDesc" style="color: var(--muted); margin: 12px 0;">Enter your phone number</p>
      <input type="tel" id="mpesaPhone" placeholder="0712 345 678" style="width: 100%; padding: 12px; border: 1px solid #CBD5E1; border-radius: 8px; margin: 12px 0;">
      <button class="btn" style="width: 100%;" onclick="confirmStk()">Confirm Payment</button>
      <p style="font-size: 12px; color: var(--muted); margin-top: 12px; text-align: center;" onclick="closeModal()">Cancel</p>
    </div>
  </div>

  <!-- Rating Modal -->
  <div id="ratingModal" class="modal">
    <div class="modal-content">
      <h3 id="ratingTitle">Rate Worker</h3>
      <p style="color: var(--muted); margin: 12px 0;">How was the experience?</p>
      <div style="display: flex; justify-content: center; gap: 8px; font-size: 32px; margin: 16px 0;">
        <span onclick="setRating(1)" class="star">☆</span>
        <span onclick="setRating(2)" class="star">☆</span>
        <span onclick="setRating(3)" class="star">☆</span>
        <span onclick="setRating(4)" class="star">☆</span>
        <span onclick="setRating(5)" class="star">☆</span>
      </div>
      <button class="btn" style="width: 100%;" onclick="submitRating()">Submit Rating</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
